<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GooseGame</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="header-left">
            <button id="homeBtn" class="header-icon-btn" title="Home" style="display:none">🏠</button>
            <h1>🪿 GOOSEGAME</h1>
        </div>
        <div class="header-controls">
            <button id="printBtn" class="header-btn print-btn" style="display:none" title="Stampa il tabellone">🖨️ Stampa</button>
            <select id="categorySelect" style="display:none">
                <option value="gettingToKnow">Getting to Know Each Other</option>
                <option value="rivers">Fiumi</option>
                <option value="leopardi">Leopardi</option>
            </select>
        </div>
    </header>

    <!-- SCREEN 1: GAME SELECTION -->
    <div id="gameSelect" class="screen game-select">
        <div class="game-select__inner">
            <p class="game-select__tagline">Scegli il gioco e inizia!</p>
            <div class="game-search">
                <span class="game-search__icon">🔍</span>
                <input type="text" id="gameSearch" placeholder="Cerca un gioco...">
                <button id="clearSearch" class="game-search__clear" style="display:none">✕</button>
            </div>
            <div id="gameGrid" class="game-grid"></div>
            <p id="noResults" class="no-results" style="display:none">Nessun gioco trovato 🤷</p>
        </div>
    </div>

    <!-- SCREEN 2: TOKEN SELECTION -->
    <div id="tokenSelect" class="screen token-select">
        <h2>Scegli i giocatori</h2>
        <p>Clicca sulle pedine che partecipano, poi premi "Inizia".</p>
        <div id="tokenGrid" class="token-grid"></div>
        <button id="startGameBtn">🎲 Inizia Partita</button>
    </div>

    <!-- SCREEN 3: BOARD -->
    <div class="board-container screen" id="boardContainer">
        <div class="board" id="gameBoard"></div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <p class="modal-text" id="modalText"></p>
            <button class="modal-close" id="modalClose">Chiudi</button>
        </div>
    </div>

    <script src="cellcontent.js"></script>
    <script src="script.js"></script>

    <footer class="site-footer">Ms Fatigato</footer>
</body>
</html>
